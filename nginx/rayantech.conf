server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Permanent 301 redirection to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    # Docker's embedded DNS. A plain `proxy_pass http://rt-web:3000;` resolves the
    # hostname once and caches the IP for the worker's lifetime — when a container is
    # rebuilt/recreated (new IP on the bridge network) nginx keeps hitting the dead IP
    # until nginx itself restarts ("connect() failed: Host is unreachable"). Routing
    # proxy_pass through a variable forces re-resolution on this TTL instead.
    resolver 127.0.0.11 valid=10s;

    # SSL Certificates (provisioned on host and mounted)
    ssl_certificate /etc/nginx/ssl/rayantech.crt;
    ssl_certificate_key /etc/nginx/ssl/rayantech.key;

    # SSL Performance and Security Optimizations
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;

    # Route backend endpoints (/api/v1/*, /trpc/*, and Torob official API paths) to rt-backend
    # - /torob_api/v3/*  → Torob Product API v3
    # - /torob/v1/*      → Torob Order & Action Tracking
    location ~ ^/(api/v1|trpc|torob_api/v3|torob/v1)/ {
        set $backend_upstream http://rt-backend:3003;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Client IP Pass-through
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # RTL / Language header pass-through
        proxy_set_header Accept-Language $http_accept_language;
    }

    # Voice AI websocket gateway (NestJS Socket.IO), also served by rt-backend
    location /voice-ai {
        set $backend_upstream http://rt-backend:3003;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Socket.IO's own handshake/polling endpoint — same backend, needed alongside /voice-ai
    location /socket.io/ {
        set $backend_upstream http://rt-backend:3003;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # The stylesheet is emitted under a STABLE, non-hashed name (assets/app.css) so the
    # SSR <link> and the client file can never disagree. Because the filename no longer
    # changes between deploys, it must be revalidated instead of cached immutably —
    # otherwise a browser would keep an old stylesheet after a redeploy. `no-cache` forces
    # a conditional request each load (cheap — one small file). Must precede /assets/.
    location = /assets/app.css {
        set $web_upstream http://rt-web:3000;
        proxy_pass $web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-cache";
    }

    # Content-hashed build assets never change content once built, so they can be
    # cached by the browser forever. This must come before the catch-all location
    # so it wins on /assets/* requests.
    location ~ ^/assets/ {
        set $web_upstream http://rt-web:3000;
        proxy_pass $web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Route all other root domain traffic to rt-web
    location / {
        set $web_upstream http://rt-web:3000;
        proxy_pass $web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Client IP Pass-through
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # HTML documents must always be revalidated — they reference the current
        # build's hashed asset filenames, which change on every deploy. Caching this
        # is what causes "MIME type text/html" errors after a redeploy: an old cached
        # HTML page keeps pointing at asset hashes that no longer exist on disk.
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store" always;
    }
}
